name: Deploy to GitHub Pages

on:
  push:
    branches: ['master']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Deploy Supabase Edge Functions (requires Supabase CLI and secrets)
  deploy-edge-functions:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
      - name: Deploy Edge Functions
        run: |
          supabase functions deploy send-bulk-sms --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy send-sms --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy send-whatsapp --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy log-reminder --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
      - name: Set Edge Function Secrets
        run: |
          supabase secrets set TWILIO_ACCOUNT_SID="${{ secrets.TWILIO_ACCOUNT_SID }}" --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase secrets set TWILIO_AUTH_TOKEN="${{ secrets.TWILIO_AUTH_TOKEN }}" --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase secrets set TWILIO_PHONE_NUMBER="${{ secrets.TWILIO_PHONE_NUMBER }}" --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          if [ -n "${{ secrets.TWILIO_MESSAGING_SERVICE_SID }}" ]; then
            supabase secrets set TWILIO_MESSAGING_SERVICE_SID="${{ secrets.TWILIO_MESSAGING_SERVICE_SID }}" --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          fi
          supabase secrets set SUPABASE_SERVICE_ROLE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}